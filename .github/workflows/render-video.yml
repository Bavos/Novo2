name: Render AI War Video

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Clean output folder
        run: rm -rf out && mkdir -p out

      - name: Render vertical video
        run: npm run build:vertical

      - name: List generated files
        run: ls -lah out

      - name: Upload MP4 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-war-vertical-video
          path: out/ai-war-vertical.mp4
          if-no-files-found: error
