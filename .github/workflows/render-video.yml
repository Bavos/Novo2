name: render-video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          

      - name: Install dependencies
        run: npm install

      - name: Ensure Remotion browser dependencies
        run: npx remotion browser ensure

      - name: Render video
        run: npx remotion render ModernWarfare out/video.mp4 --composition=ModernWarfareMobile

      - name: Upload MP4 artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-guerra-algoritmica
          path: out/video.mp4
