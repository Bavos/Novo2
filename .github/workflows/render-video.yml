name: Render AI War Video

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          

      - name: Install dependencies
        run: npm install

      - name: Render video
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-war-algorithmic
          path: out/ai-war-algorithmic.mp4
