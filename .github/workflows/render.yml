name: Render Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Render MP4
        run: npx remotion render src/index.ts video-final.mp4

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-final-mov
          path: video-final.mov
